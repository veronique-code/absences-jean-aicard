<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1F4E79">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Absences JA">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Absences — Jean Aicard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh;padding-bottom:2rem}
.topbar{background:#1F4E79;color:#fff;padding:max(env(safe-area-inset-top),14px) 16px 12px}
.topbar h1{font-size:17px;font-weight:600}
.topbar .sub{font-size:11px;opacity:.7;margin-top:2px}
.week-nav{display:flex;align-items:center;background:#2E75B6;padding:8px 14px;color:#fff;gap:8px}
.week-nav button{background:rgba(255,255,255,.18);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.week-nav button:active{background:rgba(255,255,255,.35)}
.winfo{flex:1;text-align:center}
.wlabel{font-size:13px;font-weight:600}
.pbadge{display:inline-block;font-size:10px;background:rgba(255,255,255,.22);padding:2px 10px;border-radius:99px;margin-top:3px}
.day-sel{display:flex;gap:6px;padding:10px 12px;background:#fff;border-bottom:1px solid #e2e8f0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.day-btn{flex:1;min-width:60px;padding:8px 4px;border:1.5px solid #e2e8f0;background:#f8fafc;border-radius:10px;cursor:pointer;text-align:center;color:#64748b;font-size:11px;font-family:inherit}
.day-btn .dn{font-size:10px;display:block;color:#94a3b8;margin-bottom:1px}
.day-btn.active{background:#1F4E79;border-color:#1F4E79;color:#fff}
.day-btn.active .dn{color:rgba(255,255,255,.75)}
.day-btn.has-abs{border-color:#2E75B6}
.summary-bar{margin:12px 12px 0;background:#1F4E79;color:#fff;border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.tot{font-size:28px;font-weight:700;line-height:1}
.tlbl{font-size:11px;opacity:.8;margin-top:3px}
.rc{text-align:right}
.rv{font-size:20px;font-weight:600}
.rl{font-size:10px;opacity:.8;margin-top:3px}
.section-title{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;padding:14px 14px 6px}
.cls-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin:0 12px 8px;overflow:hidden}
.cls-card.has-abs .cls-header{background:#f0f7ff}
.cls-header{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;user-select:none}
.cls-name{font-size:13px;font-weight:600;color:#1e293b;min-width:52px}
.abs-ctrl{display:flex;align-items:center;border:1.5px solid #e2e8f0;border-radius:9px;overflow:hidden}
.abs-ctrl button{background:#f8fafc;border:none;width:34px;height:34px;cursor:pointer;font-size:18px;color:#475569;font-family:inherit;display:flex;align-items:center;justify-content:center}
.abs-ctrl button:active{background:#e2e8f0}
.abs-val{width:30px;text-align:center;font-size:15px;font-weight:600;color:#1e293b;background:#fff}
.abs-val.nz{color:#1F4E79}
.chevron{font-size:18px;color:#cbd5e1;margin-left:auto;transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.noms-panel{border-top:1px solid #f1f5f9;padding:10px 13px 12px;background:#fafcff}
.noms-panel.hidden{display:none}
.eleve-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9}
.eleve-row:last-child{border-bottom:none}
.eleve-nom{flex:1;font-size:13px;color:#1e293b}
.raison-badge{font-size:11px;padding:3px 10px;border-radius:99px;border:1.5px solid #e2e8f0;cursor:pointer;font-family:inherit;background:#f8fafc;color:#64748b;white-space:nowrap}
.raison-badge.connue{background:#E1F5EE;border-color:#5DCAA5;color:#085041}
.raison-badge.inconnue{background:#FAECE7;border-color:#F0997B;color:#4A1B0C}
.del-btn{background:none;border:none;cursor:pointer;color:#cbd5e1;font-size:18px;padding:0 4px;font-family:inherit}
.del-btn:active{color:#E24B4A}
.nom-input-row{display:flex;gap:8px;margin-top:10px}
.nom-input-row input{flex:1;height:38px;border-radius:9px;border:1.5px solid #e2e8f0;padding:0 12px;font-size:14px;font-family:inherit;background:#fff;color:#1e293b;outline:none}
.nom-input-row input:focus{border-color:#2E75B6}
.nom-input-row button{height:38px;padding:0 14px;border-radius:9px;border:none;background:#2E75B6;color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.nom-input-row button:active{background:#1F4E79}
.empty-noms{font-size:12px;color:#94a3b8;font-style:italic;padding:4px 0}
.export-btn{display:block;width:calc(100% - 24px);margin:14px 12px 0;padding:13px;border-radius:12px;background:#fff;border:1.5px solid #e2e8f0;color:#475569;font-size:14px;font-family:inherit;cursor:pointer;text-align:center}
.export-btn:active{background:#f1f5f9}
.save-ind{text-align:center;font-size:11px;color:#94a3b8;margin-top:10px}
.save-ind.ok{color:#1D9E75}
</style>
</head>
<body>
<div class="topbar">
  <h1>Relevé des absences</h1>
  <div class="sub">École Jean Aicard — La Garde (83130)</div>
</div>
<div class="week-nav">
  <button id="prev-w">&#8249;</button>
  <div class="winfo">
    <div class="wlabel" id="wlabel">—</div>
    <span class="pbadge" id="pbadge">—</span>
  </div>
  <button id="next-w">&#8250;</button>
</div>
<div class="day-sel" id="day-sel"></div>
<div class="summary-bar">
  <div><div class="tot" id="tot">0</div><div class="tlbl">absents aujourd'hui</div></div>
  <div class="rc"><div class="rv" id="rcnt">0 / 0</div><div class="rl">raison connue</div></div>
</div>
<div class="section-title">Classes</div>
<div id="classes-wrap"></div>
<button class="export-btn" id="export-btn">&#128196; Copier le résumé de la semaine</button>
<div class="save-ind" id="save-ind">Données sauvegardées automatiquement</div>

<script>
const CLASSES=["CP A","CP B","CP C","CE1 A","CE1 B","CE1/CE2","CE2 A","CE2 B","CM1 A","CM1 B","CM1/CM2","CM2 A","CM2 B"];
const JNAMES={1:"Lundi",2:"Mardi",4:"Jeudi",5:"Vendredi"};

// Zone B 2026-2027 — rentrée mardi 1er septembre 2026
const vacances=[
  [new Date(2026,9,18),new Date(2026,10,1)],
  [new Date(2026,11,20),new Date(2027,0,3)],
  [new Date(2027,1,13),new Date(2027,1,28)],
  [new Date(2027,3,24),new Date(2027,4,9)]
];
const periods=[
  ["P1",new Date(2026,8,1),new Date(2026,9,17)],
  ["P2",new Date(2026,10,2),new Date(2026,11,19)],
  ["P3",new Date(2027,0,4),new Date(2027,1,12)],
  ["P4",new Date(2027,2,1),new Date(2027,3,23)],
  ["P5",new Date(2027,4,10),new Date(2027,6,3)]
];

function isVac(d){return vacances.some(([s,e])=>d>=s&&d<=e);}
function isSchool(d){const w=d.getDay();if(w===0||w===3||w===6)return false;return!isVac(d);}
function getPeriod(d){for(const[n,s,e]of periods){if(d>=s&&d<=e)return n;}return"—";}
function fmt(d){return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});}
function getMonday(d){const day=d.getDay()||7;const m=new Date(d);m.setDate(d.getDate()-day+1);return m;}

const allWeeks=[];
let cur=new Date(2026,8,1); // 1er septembre 2026
const end=new Date(2027,6,3);
while(cur<=end){
  if(isSchool(cur)){
    const mon=getMonday(cur);const key=mon.toISOString().slice(0,10);
    if(!allWeeks.length||allWeeks[allWeeks.length-1].key!==key)allWeeks.push({key,monday:new Date(mon),days:[]});
    allWeeks[allWeeks.length-1].days.push(new Date(cur));
  }
  cur.setDate(cur.getDate()+1);
}

const STORE='absences_ja_2627';
let state={};
try{const s=localStorage.getItem(STORE);if(s)state=JSON.parse(s);}catch(e){}

let saveTimer=null;
function save(){
  try{localStorage.setItem(STORE,JSON.stringify(state));}catch(e){}
  clearTimeout(saveTimer);
  const el=document.getElementById('save-ind');
  el.textContent='✓ Sauvegardé';el.className='save-ind ok';
  saveTimer=setTimeout(()=>{el.textContent='Données sauvegardées automatiquement';el.className='save-ind';},2000);
}

function k(w,d,c){return`${w}_${d}_${c}`;}
function get(w,d,c){return state[k(w,d,c)]||{eleves:[]};}
function ensure(w,d,c){if(!state[k(w,d,c)])state[k(w,d,c)]={eleves:[]};}

const openPanels={};
let cw=0,cd=0;

function findCurrentWeek(){
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<allWeeks.length;i++){
    if(allWeeks[i].days.some(d=>{const dd=new Date(d);dd.setHours(0,0,0,0);return dd.getTime()===today.getTime()}))return i;
    if(new Date(allWeeks[i].monday)<=today&&(i===allWeeks.length-1||new Date(allWeeks[i+1].monday)>today))return i;
  }
  return 0;
}
cw=findCurrentWeek();

function renderWeekNav(){
  const w=allWeeks[cw];
  document.getElementById('wlabel').textContent=`Sem. ${cw+1} — ${fmt(w.days[0])} au ${fmt(w.days[w.days.length-1])}`;
  document.getElementById('pbadge').textContent=getPeriod(w.monday);
  document.getElementById('prev-w').style.opacity=cw===0?'0.4':'1';
  document.getElementById('next-w').style.opacity=cw===allWeeks.length-1?'0.4':'1';
}

function renderDays(){
  const w=allWeeks[cw];
  const container=document.getElementById('day-sel');
  container.innerHTML='';
  if(cd>=w.days.length)cd=0;
  w.days.forEach((d,i)=>{
    const wd=d.getDay();
    const hasAbs=CLASSES.some(c=>get(cw,i,c).eleves.length>0);
    const btn=document.createElement('button');
    btn.className='day-btn'+(i===cd?' active':'')+(hasAbs&&i!==cd?' has-abs':'');
    btn.innerHTML=`<span class="dn">${JNAMES[wd]||''}</span>${fmt(d)}`;
    btn.onclick=()=>{cd=i;renderAll();};
    container.appendChild(btn);
  });
}

function renderSummary(){
  let tot=0,ra=0;
  CLASSES.forEach(c=>{
    const d=get(cw,cd,c);
    tot+=d.eleves.length;
    ra+=d.eleves.filter(e=>e.raison).length;
  });
  document.getElementById('tot').textContent=tot;
  document.getElementById('rcnt').textContent=`${ra} / ${tot}`;
}

function renderClasses(){
  const wrap=document.getElementById('classes-wrap');
  wrap.innerHTML='';
  CLASSES.forEach(cls=>{
    const d=get(cw,cd,cls);
    const pk=`${cw}_${cd}_${cls}`;
    const open=!!openPanels[pk];
    const nbAbs=d.eleves.length;

    const card=document.createElement('div');
    card.className='cls-card'+(nbAbs>0?' has-abs':'');

    // Header
    const hdr=document.createElement('div');
    hdr.className='cls-header';
    hdr.innerHTML=`
      <span class="cls-name">${cls}</span>
      <div class="abs-ctrl">
        <button class="dec-btn">−</button>
        <span class="abs-val${nbAbs>0?' nz':''}" id="av_${cls.replace(/ /g,'_')}">${nbAbs}</span>
        <button class="inc-btn">+</button>
      </div>
      <span class="chevron${open?' open':''}">&#8964;</span>`;
    card.appendChild(hdr);

    // Panel noms
    const panel=document.createElement('div');
    panel.className='noms-panel'+(open?'':' hidden');

    function renderElevesPanel(){
      panel.innerHTML='';
      const nd=get(cw,cd,cls);
      if(!nd.eleves.length){
        panel.innerHTML='<p class="empty-noms">Appuyez sur + pour ajouter un élève absent</p>';
      } else {
        nd.eleves.forEach((eleve,i)=>{
          const row=document.createElement('div');
          row.className='eleve-row';
          row.innerHTML=`
            <span class="eleve-nom">${eleve.nom}</span>
            <button class="raison-badge ${eleve.raison?'connue':'inconnue'}" data-i="${i}">
              ${eleve.raison?'✓ Raison connue':'? Inconnue'}
            </button>
            <button class="del-btn" data-i="${i}" aria-label="Supprimer">×</button>`;
          panel.appendChild(row);
        });
      }
      // champ saisie
      const inputRow=document.createElement('div');
      inputRow.className='nom-input-row';
      const inp=document.createElement('input');
      inp.type='text';inp.placeholder='Nom, Prénom';inp.autocomplete='off';inp.autocapitalize='words';
      const addBtn=document.createElement('button');
      addBtn.textContent='Ajouter';
      function addEleve(){
        const v=inp.value.trim();if(!v)return;
        ensure(cw,cd,cls);
        state[k(cw,cd,cls)].eleves.push({nom:v,raison:false});
        inp.value='';
        updateAbsVal();
        renderElevesPanel();
        save();
      }
      addBtn.onclick=addEleve;
      inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();addEleve();}};
      inputRow.appendChild(inp);inputRow.appendChild(addBtn);
      panel.appendChild(inputRow);

      // Toggle raison
      panel.querySelectorAll('.raison-badge').forEach(btn=>{
        btn.onclick=e=>{
          e.stopPropagation();
          const i=parseInt(btn.dataset.i);
          ensure(cw,cd,cls);
          state[k(cw,cd,cls)].eleves[i].raison=!state[k(cw,cd,cls)].eleves[i].raison;
          renderElevesPanel();renderSummary();save();
        };
      });
      // Supprimer élève
      panel.querySelectorAll('.del-btn').forEach(btn=>{
        btn.onclick=e=>{
          e.stopPropagation();
          const i=parseInt(btn.dataset.i);
          ensure(cw,cd,cls);
          state[k(cw,cd,cls)].eleves.splice(i,1);
          updateAbsVal();renderElevesPanel();renderSummary();renderDays();save();
        };
      });
    }
    renderElevesPanel();
    card.appendChild(panel);

    function updateAbsVal(){
      const nb=get(cw,cd,cls).eleves.length;
      const el=document.getElementById('av_'+cls.replace(/ /g,'_'));
      if(el){el.textContent=nb;el.className='abs-val'+(nb>0?' nz':'');}
      card.className='cls-card'+(nb>0?' has-abs':'');
      renderSummary();renderDays();
    }

    // +/- boutons
    hdr.querySelector('.dec-btn').onclick=e=>{
      e.stopPropagation();
      ensure(cw,cd,cls);
      const eleves=state[k(cw,cd,cls)].eleves;
      if(eleves.length>0){eleves.pop();updateAbsVal();renderElevesPanel();save();}
    };
    hdr.querySelector('.inc-btn').onclick=e=>{
      e.stopPropagation();
      ensure(cw,cd,cls);
      state[k(cw,cd,cls)].eleves.push({nom:'Élève '+(state[k(cw,cd,cls)].eleves.length+1),raison:false});
      updateAbsVal();
      openPanels[pk]=true;
      panel.classList.remove('hidden');
      hdr.querySelector('.chevron').classList.add('open');
      renderElevesPanel();save();
    };

    // Toggle panel
    hdr.onclick=e=>{
      if(e.target.closest('.dec-btn')||e.target.closest('.inc-btn'))return;
      openPanels[pk]=!openPanels[pk];
      panel.classList.toggle('hidden',!openPanels[pk]);
      hdr.querySelector('.chevron').classList.toggle('open',!!openPanels[pk]);
    };

    wrap.appendChild(card);
  });
}

function renderAll(){renderWeekNav();renderDays();renderClasses();renderSummary();}

document.getElementById('prev-w').onclick=()=>{if(cw>0){cw--;cd=0;renderAll();}};
document.getElementById('next-w').onclick=()=>{if(cw<allWeeks.length-1){cw++;cd=0;renderAll();}};

document.getElementById('export-btn').onclick=()=>{
  const w=allWeeks[cw];
  const lines=[`Semaine ${cw+1} — ${fmt(w.days[0])} au ${fmt(w.days[w.days.length-1])}`,''];
  w.days.forEach((d,i)=>{
    let tot=0;const details=[];
    CLASSES.forEach(c=>{
      const entry=get(cw,i,c);
      tot+=entry.eleves.length;
      if(entry.eleves.length>0){
        entry.eleves.forEach(e=>{
          details.push(`  ${c} — ${e.nom} : ${e.raison?'raison connue':'raison inconnue'}`);
        });
      }
    });
    lines.push(`${JNAMES[d.getDay()]} ${fmt(d)} — ${tot} absent(s)`);
    details.forEach(l=>lines.push(l));
    if(!details.length)lines.push('  Aucune absence');
    lines.push('');
  });
  const txt=lines.join('\n');
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>{
      const btn=document.getElementById('export-btn');
      btn.textContent='✓ Copié !';
      setTimeout(()=>{btn.innerHTML='&#128196; Copier le résumé de la semaine';},2000);
    });
  }
};

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
renderAll();
</script>
</body>
</html>
